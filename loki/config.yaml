# Loki AI Desktop Assistant — Configuration

assistant:
  name: Loki
  wakeword: "Hey Loki"
  personality: norse_trickster  # witty, sharp, helpful

llm:
  # Provider priority (speed-first): OpenRouter → NVIDIA NIM → Kimi → Ollama
  # Set OPENROUTER_API_KEY and/or NVIDIA_API_KEY in loki/.env

  # OpenRouter models — Kimi K2.6 free first, then quality fallbacks
  fast_model:           moonshotai/kimi-k2.6:free          # Kimi K2.6 FREE via OpenRouter ✓
  fallback_model:       google/gemma-4-31b-it:free         # ~5.6s quality fallback
  second_fallback_model: openai/gpt-oss-120b:free          # high quality backup

  # NVIDIA NIM — Kimi K2.6 (set NVIDIA_API_KEY in .env to enable)
  nvidia_thinking: false  # true = deep reasoning but slow (30-90s); false = fast mode

  # Kimi Moonshot direct (set KIMI_API_KEY in .env to enable)
  kimi_model: kimi-k2

  # Ollama local fallback (run: ollama serve && ollama pull phi3:mini)
  ollama_model: phi3:mini

  max_tokens: 600
  temperature: 0.70

whisper:
  model: base.en
  device: cpu
  language: en

wakeword:
  method: whisper      # "porcupine" | "whisper"
  keyword: "hey loki"
  chunk_duration: 2.0
  check_interval: 0.5
  porcupine_sensitivity: 0.5
  rms_threshold: 0.006   # min audio energy — below this is silence (was 0.01, missed soft speech)

tts:
  engine: edge         # "edge" | "pyttsx3" | "luxtts"
  voice: en-GB-RyanNeural   # edge-tts voice (sounds like Loki)
  rate: +0%
  volume: +0%
  fallback_engine: pyttsx3

ui:
  port: 7777
  conversation_timeout_seconds: 30

memory:
  max_turns: 30
  conversation_file: memory/conversation.json
  profile_file: memory/user_profile.json
  tasks_file: memory/tasks.json
  vault_file: memory/vault.enc

audio:
  sample_rate: 16000
  channels: 1
  vad_aggressiveness: 1      # 0-3; 1 catches more speech without false positives
  silence_duration: 1.0      # seconds of silence before flushing to Whisper (was 2.0, felt laggy)
  min_audio_seconds: 0.35    # minimum clip length sent to Whisper — shorter clips hallucinate
  max_record_seconds: 15     # safety flush if speech never stops
  no_speech_threshold: 0.35  # Whisper: treat segments below this prob as silence
  enable_audio_cues: true
  wakeword_chime: true
  error_sound: true

actions:
  allowlist_file: data/command_allowlist.txt
  home_dir_only: true
  shell_timeout: 30
  confirm_destructive: true   # always confirm deletes/kills

undo:
  max_depth: 25

features:
  file_search:
    max_results: 20
    search_content: true
    max_file_size_mb: 10
  system_monitor:
    update_interval: 2.0
    alert_cpu_percent: 90
    alert_ram_percent: 85
  focus_mode:
    block_sites:
      - youtube.com
      - reddit.com
      - twitter.com
      - facebook.com
      - instagram.com
      - tiktok.com
      - twitch.tv
      - netflix.com
    hosts_file: "C:/Windows/System32/drivers/etc/hosts"
  file_organizer:
    watch_dirs:
      - ~/Downloads
      - ~/Desktop
    rules:
      images: [.jpg, .jpeg, .png, .gif, .bmp, .webp, .svg, .ico]
      documents: [.pdf, .doc, .docx, .xls, .xlsx, .ppt, .pptx, .txt, .md]
      videos: [.mp4, .avi, .mkv, .mov, .wmv, .flv, .webm]
      audio: [.mp3, .wav, .flac, .aac, .ogg, .m4a]
      code: [.py, .js, .ts, .html, .css, .java, .cpp, .c, .h, .go, .rs, .rb]
      archives: [.zip, .rar, .7z, .tar, .gz, .bz2]
      executables: [.exe, .msi, .bat, .cmd, .ps1]
  vault:
    algorithm: AES-256-GCM
    pbkdf2_iterations: 310000
  security_scanner:
    # Patterns are defined in loki/features/security_scanner.py (DEFAULT_PATTERNS)
    # Override here only if needed — regex strings with quotes are tricky in YAML

logging:
  level: INFO          # DEBUG = verbose (see every wakeword candidate, audio frame)
                       # INFO  = normal (clean flow view) — recommended
                       # WARNING = quiet (errors only)
  color: true          # color-coded terminal output (auto-off if not a TTY)
  file: loki.log       # full DEBUG detail always written here regardless of level
